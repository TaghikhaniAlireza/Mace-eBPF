# =============================================================================
# Mace-eBPF — Continuous Integration (main)
# =============================================================================
# `build-and-test` runs on a **matrix of GitHub-hosted Ubuntu images** so the same
# pre-built CO-RE eBPF object is loaded under **different host kernels** (5.x / 6.x
# depending on the runner image). User-space is always Ubuntu on these runners.
#
# **Fedora / AlmaLinux / other distros:** GitHub does not provide `runs-on: fedora-*` or
# `almalinux-*` for standard hosted jobs. Use **self-hosted** runners with your own labels,
# or the **Vagrant** matrix under `scripts/vm/`, if you need those userlands in CI.
#
# **`ubuntu-18.04`:** Retired for many organizations; it is omitted from the matrix below.
# Uncomment the line in `matrix.os` if your plan still offers `ubuntu-18.04` runners.
#
# **`ubuntu-20.04`:** GitHub-hosted `ubuntu-20.04` pools are small / deprecated and jobs often
# **queue indefinitely**. Prefer `ubuntu-22.04` + `ubuntu-24.04` only; re-add `ubuntu-20.04` only if
# you accept long waits or use self-hosted runners.
#
# Notes:
# - Do **not** use `cargo ... --all-features` on the whole workspace: that enables
#   `mace-ebpf-ebpf/ebpf-bin`, which builds the `#!no_std` BPF binary for the host and hits
#   `E0152` duplicate `panic_impl` with `std`.
# - If `--include-ignored` eBPF tests become flaky on a future runner kernel, narrow or gate
#   that step.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "mace-ebpf/**"
      - "mace-ebpf-common/**"
      - "mace-ebpf-ebpf/**"
      - "mace-ebpf-loader/**"
      - "clients/go/**"
      - "mace-ebpf/pkg/**"
      - "mace-ebpf/python/**"
      - "scripts/**"
      - "run_memory_checks.sh"
      - "Makefile"
      - "Dockerfile"
      - ".dockerignore"
      - "packaging/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "mace-ebpf/**"
      - "mace-ebpf-common/**"
      - "mace-ebpf-ebpf/**"
      - "mace-ebpf-loader/**"
      - "clients/go/**"
      - "mace-ebpf/pkg/**"
      - "mace-ebpf/python/**"
      - "scripts/**"
      - "run_memory_checks.sh"
      - "Makefile"
      - "Dockerfile"
      - ".dockerignore"
      - "packaging/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-audit:
    name: Lint and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install nightly Rust (rustfmt + build-std for mace-ebpf build.rs)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, rust-src

      - name: Install stable Rust (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Cache Cargo home
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-and-audit

      - name: rustfmt (nightly)
        run: cargo +nightly fmt --all -- --check

      - name: clippy
        run: cargo +stable clippy --workspace --exclude mace-ebpf-ebpf --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit (dependencies)
        run: cargo audit

  ffi-bindings-test:
    name: FFI bindings (Go + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Cache Cargo home
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ffi-bindings-test

      - name: Build shared library (debug)
        run: cargo build -p mace-ebpf --verbose

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: mace-ebpf/pkg/mace/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mace-ebpf/python/setup.py

      - name: Prefetch Go modules and Python test deps
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e "${ROOT}/mace-ebpf/python" &
          pip_pid=$!
          ( cd "${ROOT}/mace-ebpf/pkg/mace" && go mod download ) &
          go_pid=$!
          wait "${pip_pid}"
          wait "${go_pid}"

      - name: Go and Python tests (parallel)
        env:
          CGO_ENABLED: "1"
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"

          ( cd "${ROOT}/mace-ebpf/pkg/mace" && go test -race -v ./... ) &
          go_pid=$!

          ( cd "${ROOT}/mace-ebpf/python" && python -m pytest tests/ -v ) &
          py_pid=$!

          go_exit=0
          wait "${go_pid}" || go_exit=$?
          py_exit=0
          wait "${py_pid}" || py_exit=$?

          if [[ "${go_exit}" -ne 0 ]]; then
            echo "::error::Go tests failed (exit ${go_exit})"
          fi
          if [[ "${py_exit}" -ne 0 ]]; then
            echo "::error::Python tests failed (exit ${py_exit})"
          fi
          if [[ "${go_exit}" -ne 0 || "${py_exit}" -ne 0 ]]; then
            exit 1
          fi

  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo home and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}"

      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler
          KERN="$(uname -r)"
          if sudo apt-get install -y --no-install-recommends "linux-tools-${KERN}"; then
            echo "Installed linux-tools-${KERN} (includes bpftool)"
          elif sudo apt-get install -y --no-install-recommends "linux-cloud-tools-${KERN}"; then
            echo "Installed linux-cloud-tools-${KERN} (includes bpftool)"
          else
            echo "WARNING: no linux-tools package for ${KERN}; bpftool unavailable (build still OK)"
          fi
          command -v bpftool && bpftool version || true

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Build and test (prometheus feature on mace-ebpf)
        run: |
          cargo build -p mace-ebpf --features prometheus --verbose
          cargo test -p mace-ebpf --features prometheus --test observability_integration --verbose

      - name: Criterion regression gate (arena + rule engine)
        run: |
          set -euxo pipefail
          cargo bench -p mace-ebpf --bench rule_engine_bench --bench arena_benchmark -- --noplot 2>&1 \
            | python3 scripts/ci/criterion_gate.py

      - name: Run tests (sudo, full BPF suite)
        env:
          MACE_MPROTECT_SLOWDOWN_MAX: "4"
        run: |
          set -euxo pipefail
          sudo -E env \
            "PATH=${PATH}" \
            "HOME=${HOME}" \
            "RUSTUP_HOME=${RUSTUP_HOME:-${HOME}/.rustup}" \
            "CARGO_HOME=${CARGO_HOME:-${HOME}/.cargo}" \
            "MACE_MPROTECT_SLOWDOWN_MAX=${MACE_MPROTECT_SLOWDOWN_MAX}" \
            cargo test --workspace --verbose -- --include-ignored
