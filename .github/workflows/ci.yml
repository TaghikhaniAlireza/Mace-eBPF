# =============================================================================
# Aegis-eBPF — Continuous Integration (main)
# =============================================================================
# `build-and-test` runs on a **matrix of GitHub-hosted Ubuntu images** so the same
# pre-built CO-RE eBPF object is loaded under **different host kernels** (5.x / 6.x
# depending on the runner image). User-space is always Ubuntu on these runners.
#
# **Fedora / AlmaLinux / other distros:** GitHub does not provide `runs-on: fedora-*` or
# `almalinux-*` for standard hosted jobs. Use **self-hosted** runners with your own labels,
# or the **Vagrant** matrix under `scripts/vm/`, if you need those userlands in CI.
#
# **`ubuntu-18.04`:** Retired for many organizations; it is omitted from the matrix below.
# Uncomment the line in `matrix.os` if your plan still offers `ubuntu-18.04` runners.
#
# **`ubuntu-20.04`:** GitHub-hosted `ubuntu-20.04` pools are small / deprecated and jobs often
# **queue indefinitely**. Prefer `ubuntu-22.04` + `ubuntu-24.04` only; re-add `ubuntu-20.04` only if
# you accept long waits or use self-hosted runners.
#
# Notes:
# - Do **not** use `cargo ... --all-features` on the whole workspace: that enables
#   `aegis-ebpf-ebpf/ebpf-bin`, which builds the `#!no_std` BPF binary for the host and hits
#   `E0152` duplicate `panic_impl` with `std`.
# - If `--include-ignored` eBPF tests become flaky on a future runner kernel, narrow or gate
#   that step.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use Node 24 for JS actions where supported (reduces Node 20 deprecation noise on runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Runs in parallel with `build-and-test` (no `needs:`). Add `needs: [lint-and-audit]` to
  # `build-and-test` if you want lint to gate the matrix.
  lint-and-audit:
    name: Lint and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Install nightly first, then stable last so **stable** is the default `cargo` toolchain
      # (plain `cargo clippy` would otherwise resolve to nightly, which has no clippy here).
      - name: Install nightly Rust (rustfmt + build-std for aegis-ebpf build.rs)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, rust-src

      - name: Install stable Rust (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Same toolchain inputs as `build-and-test` so `aegis-ebpf/build.rs` (prost, nested eBPF)
      # can run under `cargo clippy`.
      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Cache Cargo home
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-and-audit

      - name: rustfmt (nightly)
        run: cargo +nightly fmt --all -- --check

      # Exclude `aegis-ebpf-ebpf`: `no_std` BPF crate, not clippy'd for the host target.
      - name: clippy
        run: cargo +stable clippy --workspace --exclude aegis-ebpf-ebpf --all-targets -- -D warnings

      # `cargo audit` consults the RustSec advisory DB (includes CVSS metadata where published).
      # Prefer `cargo deny` + `deny.toml` for licenses/bans/yanking; there is no `deny.toml` yet.
      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit (dependencies)
        run: cargo audit

  # Go + Python FFI smoke tests against `target/debug/libaegis_ebpf.so`.
  # Paths: Go module is `aegis-ebpf/pkg/aegis` (not `./bindings/go`). Python package is `aegis-ebpf/python`.
  ffi-bindings-test:
    name: FFI bindings (Go + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # `aegis-ebpf` build.rs needs nightly + rust-src + same native toolchain as other jobs.
      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Cache Cargo home
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ffi-bindings-test

      - name: Build shared library (debug)
        run: cargo build -p aegis-ebpf --verbose

      # --- Go + Python toolchains (cached: speeds repeat CI; `go mod download` still runs below).
      # v6+ uses Node 24 (v5 targets Node 20 → deprecation warning when runners force Node 24).
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: aegis-ebpf/pkg/aegis/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aegis-ebpf/python/setup.py

      # Prefetch modules while installing pytest (I/O overlap). Both only need the checkout + `.so` path for later tests.
      - name: Prefetch Go modules and Python test deps
        shell: bash
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e "${ROOT}/aegis-ebpf/python" &
          pip_pid=$!
          ( cd "${ROOT}/aegis-ebpf/pkg/aegis" && go mod download ) &
          go_pid=$!
          wait "${pip_pid}"
          wait "${go_pid}"

      # Go (`-race`) and Python tests are independent; run in parallel to shorten wall-clock.
      # Both only read `libaegis_ebpf.so` — no shared mutable state between processes.
      - name: Go and Python tests (parallel)
        shell: bash
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/target/debug -laegis_ebpf -Wl,-rpath,${{ github.workspace }}/target/debug"
          LD_LIBRARY_PATH: "${{ github.workspace }}/target/debug"
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          export LD_LIBRARY_PATH="${ROOT}/target/debug:${LD_LIBRARY_PATH:-}"

          ( cd "${ROOT}/aegis-ebpf/pkg/aegis" && go test -race -v ./... ) &
          go_pid=$!

          ( cd "${ROOT}/aegis-ebpf/python" && python -m pytest tests/ -v ) &
          py_pid=$!

          go_exit=0
          wait "${go_pid}" || go_exit=$?
          py_exit=0
          wait "${py_pid}" || py_exit=$?

          if [[ "${go_exit}" -ne 0 ]]; then
            echo "::error::Go tests failed (exit ${go_exit})"
          fi
          if [[ "${py_exit}" -ne 0 ]]; then
            echo "::error::Python tests failed (exit ${py_exit})"
          fi
          if [[ "${go_exit}" -ne 0 || "${py_exit}" -ne 0 ]]; then
            exit 1
          fi

  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # - ubuntu-18.04  # uncomment only if your GitHub plan still provides this runner
          # - ubuntu-20.04  # often stuck queued — GitHub pool is tiny/deprecated; use 22.04+ or self-hosted
          - ubuntu-22.04
          - ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Nightly first (rust-src for nested eBPF build), then stable so plain `cargo` is stable.
      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, rust-src

      # --- Cargo cache: registry + git dependencies + `target/` (speeds rebuilds).
      - name: Cache Cargo home and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}"

      # --- Native packages: LLVM/clang, libelf/zlib, kernel UAPI headers.
      #     `bpftool` is not a real package on Ubuntu — it is a virtual package satisfied by
      #     `linux-tools-$(uname -r)` or `linux-cloud-tools-$(uname -r)`.
      - name: Install eBPF and build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            linux-headers-generic \
            "linux-headers-$(uname -r)" \
            pkg-config \
            build-essential \
            protobuf-compiler
          KERN="$(uname -r)"
          if sudo apt-get install -y --no-install-recommends "linux-tools-${KERN}"; then
            echo "Installed linux-tools-${KERN} (includes bpftool)"
          elif sudo apt-get install -y --no-install-recommends "linux-cloud-tools-${KERN}"; then
            echo "Installed linux-cloud-tools-${KERN} (includes bpftool)"
          else
            echo "WARNING: no linux-tools package for ${KERN}; bpftool unavailable (build still OK)"
          fi
          command -v bpftool && bpftool version || true

      # --- bpf-linker: required by `aegis-ebpf-ebpf/build.rs` (undeclared binary dep).
      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Build and test (prometheus feature on aegis-ebpf)
        run: |
          cargo build -p aegis-ebpf --features prometheus --verbose
          cargo test -p aegis-ebpf --features prometheus --test observability_integration --verbose

      - name: Run tests (sudo, full BPF suite)
        run: |
          set -euxo pipefail
          sudo -E env \
            "PATH=${PATH}" \
            "HOME=${HOME}" \
            "RUSTUP_HOME=${RUSTUP_HOME:-${HOME}/.rustup}" \
            "CARGO_HOME=${CARGO_HOME:-${HOME}/.cargo}" \
            cargo test --workspace --verbose -- --include-ignored
