# =============================================================================
# Publish OCI images to GHCR (linux/amd64 + linux/arm64), sign with Cosign (keyless).
# =============================================================================
# Triggers: push to main, version tags v*
# Image:    ghcr.io/<owner-lowercase>/aegis-ebpf:<tag>
# Requires: packages: write, id-token: write (OIDC for keyless cosign)
# =============================================================================

name: Docker

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-publish.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "aegis-ebpf/**"
      - "aegis-ebpf-common/**"
      - "aegis-ebpf-ebpf/**"
      - "aegis-ebpf-loader/**"
      - "clients/go/**"
      - "packaging/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aegis-ebpf

jobs:
  build-push-sign:
    name: Build, push, and sign image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Image name (GHCR requires lowercase owner)
        id: image
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${{ env.REGISTRY }}/${owner_lc}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euxo pipefail
          test -n "${DIGEST}"
          cosign sign --yes "${{ steps.image.outputs.image }}@${DIGEST}"
