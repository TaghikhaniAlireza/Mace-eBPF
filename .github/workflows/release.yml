# =============================================================================
# Mace-eBPF — GitHub Release
# =============================================================================
# Tag push `v*`: release Rust FFI tarball, build mace-agent (CGO + static Rust),
# produce .deb via nFPM, and publish a GitHub Release.
#
# Rust workspace needs nightly + rust-src + bpf-linker for the nested eBPF build.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NFPM_VERSION: "2.41.2"

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: clients/go/go.sum

      - name: Cache Cargo (release build)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ github.ref_name }}

      - name: Install eBPF build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            gcc-multilib \
            build-essential \
            pkg-config \
            protobuf-compiler \
            linux-headers-generic \
            "linux-headers-$(uname -r)"

      - name: Install bpf-linker
        run: cargo install bpf-linker --version 0.10.3

      - name: Install nFPM
        run: |
          set -euxo pipefail
          curl -sL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" | sudo tar xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build release workspace (Rust)
        run: cargo build --release --verbose

      - name: Build mace-agent (Go + CGO, static Rust release lib)
        run: |
          set -euxo pipefail
          mkdir -p build
          cd clients/go
          CGO_ENABLED=1 go build -tags mace_static_release -o "${GITHUB_WORKSPACE}/build/mace-agent" ./cmd/mace-agent

      - name: Package .deb with nFPM
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION_TAG="${VERSION}"
          nfpm package --config packaging/nfpm.yaml --packager deb --target "${GITHUB_WORKSPACE}"
          ls -la "${GITHUB_WORKSPACE}/"*.deb

      - name: Stage FFI tarball (lib + header)
        run: |
          set -euxo pipefail
          STAGE="${RUNNER_TEMP}/mace-ebpf-release"
          rm -rf "${STAGE}"
          mkdir -p "${STAGE}"

          cp -v target/release/libmace_ebpf.so "${STAGE}/"
          cp -v target/release/libmace_ebpf.a "${STAGE}/"

          HEADER="${GITHUB_WORKSPACE}/mace-ebpf/include/mace.h"
          if [[ -f "${HEADER}" ]]; then
            cp -v "${HEADER}" "${STAGE}/"
          else
            echo "::warning::mace.h not found at ${HEADER}; tarball will contain only libraries"
          fi

          tar -czf "${GITHUB_WORKSPACE}/mace-ebpf-linux-amd64.tar.gz" -C "${STAGE}" .
          ls -la "${GITHUB_WORKSPACE}/mace-ebpf-linux-amd64.tar.gz"
          tar -tzf "${GITHUB_WORKSPACE}/mace-ebpf-linux-amd64.tar.gz"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            mace-ebpf-linux-amd64.tar.gz
            *.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
