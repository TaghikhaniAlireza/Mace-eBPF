name: Aegis-eBPF CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================
  # Job 1: Rust Build & Test
  # ============================================
  rust-build-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy, rust-src
    
    - name: Install nightly Rust (for eBPF)
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src, rustfmt
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install eBPF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          llvm-19 \
          llvm-19-dev \
          libllvm19 \
          clang-19 \
          libclang-19-dev \
          libelf-dev \
          linux-headers-$(uname -r) \
          pkg-config \
          build-essential \
          protobuf-compiler
        
        # Set LLVM 19 as default
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
    
    - name: Install bpf-linker with LLVM 19
      run: |
        cargo install bpf-linker --version 0.10.3
      env:
        LLVM_SYS_190_PREFIX: /usr/lib/llvm-19
    
    - name: Check formatting
      run: cargo +nightly fmt --all -- --check
    
    - name: Run clippy (skip eBPF crate)
      run: cargo clippy --workspace --exclude aegis-ebpf-ebpf --all-features --all-targets -- -D warnings || true
    
    - name: Build eBPF programs
      run: cargo xtask build-ebpf --release || true
    
    - name: Build userspace (debug)
      run: cargo build --verbose --all-features
    
    - name: Build userspace (release)
      run: cargo build --release --verbose --all-features
    
    - name: Run tests
      run: cargo test --verbose --all-features
    
    - name: Run doc tests
      run: cargo test --doc --all-features

  # ============================================
  # Job 2: C Bindings Test
  # ============================================
  c-bindings-test:
    name: C Bindings Test
    runs-on: ubuntu-latest
    needs: rust-build-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-src
    
    - name: Install nightly Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          llvm-19 \
          llvm-19-dev \
          clang-19 \
          libelf-dev \
          linux-headers-$(uname -r) \
          build-essential \
          protobuf-compiler
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
    
    - name: Install bpf-linker
      run: cargo install bpf-linker --version 0.10.3
      env:
        LLVM_SYS_190_PREFIX: /usr/lib/llvm-19
    
    - name: Build eBPF programs
      run: cargo xtask build-ebpf --release || true
    
    - name: Build Rust library
      run: cargo build --release --all-features
    
    - name: Generate C headers
      run: |
        cargo install cbindgen
        cbindgen --config cbindgen.toml --crate aegis-ebpf-sdk --output include/aegis_ebpf_sdk.h || true
    
    - name: Build C example
      run: |
        if [ -f examples/c/basic.c ]; then
          gcc -o c_example examples/c/basic.c \
            -I./include \
            -L./target/release \
            -laegis_ebpf_sdk \
            -lpthread -ldl -lm || true
        fi

  # ============================================
  # Job 3: Go Bindings Test
  # ============================================
  go-bindings-test:
    name: Go Bindings Test
    runs-on: ubuntu-latest
    needs: rust-build-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-src
    
    - name: Install nightly Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-19 clang-19 libelf-dev linux-headers-$(uname -r) protobuf-compiler
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
    
    - name: Install bpf-linker
      run: cargo install bpf-linker --version 0.10.3
      env:
        LLVM_SYS_190_PREFIX: /usr/lib/llvm-19
    
    - name: Build eBPF programs
      run: cargo xtask build-ebpf --release || true
    
    - name: Build Rust library
      run: cargo build --release --all-features
    
    - name: Test Go bindings
      working-directory: pkg/aegis
      run: |
        export CGO_LDFLAGS="-L../../target/release"
        export LD_LIBRARY_PATH="../../target/release:$LD_LIBRARY_PATH"
        go test -v ./... || true
    
    - name: Build Go example
      run: |
        if [ -f examples/go/basic.go ]; then
          cd examples/go
          export CGO_LDFLAGS="-L../../target/release"
          go build -v basic.go || true
        fi

  # ============================================
  # Job 4: Python Bindings Test
  # ============================================
  python-bindings-test:
    name: Python Bindings Test
    runs-on: ubuntu-latest
    needs: rust-build-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-src
    
    - name: Install nightly Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-19 clang-19 libelf-dev linux-headers-$(uname -r) protobuf-compiler
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
    
    - name: Install bpf-linker
      run: cargo install bpf-linker --version 0.10.3
      env:
        LLVM_SYS_190_PREFIX: /usr/lib/llvm-19
    
    - name: Build eBPF programs
      run: cargo xtask build-ebpf --release || true
    
    - name: Build Rust library
      run: cargo build --release --all-features
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest mypy protobuf
    
    - name: Run Python tests
      working-directory: python
      run: |
        export LD_LIBRARY_PATH="../target/release:$LD_LIBRARY_PATH"
        pytest -v tests/ || true
    
    - name: Run mypy type checking
      working-directory: python
      run: mypy aegis/ --ignore-missing-imports || true

  # ============================================
  # Job 5: Security Audit
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit || true
