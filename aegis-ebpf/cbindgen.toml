language = "C"
include_guard = "AEGIS_EBPF_H"
pragma_once = true
autogen_warning = "/* THIS FILE IS AUTO-GENERATED BY cbindgen. DO NOT EDIT. */"
tab_width = 4
documentation = true
documentation_style = "c99"

[export]
include = [
    "RawMemoryEvent",
    "CAlert",
    "CSeverity",
    "AegisArenaHandle",
    "AegisAlertChannelHandle",
    "AegisErrorCode",
    "aegis_arena_new",
    "aegis_arena_free",
    "aegis_arena_push",
    "aegis_arena_pop",
    "aegis_arena_try_push",
    "aegis_arena_try_pop",
    "aegis_arena_len",
    "aegis_arena_capacity",
    "aegis_alert_channel_new",
    "aegis_alert_channel_free",
    "aegis_alert_channel_try_recv",
    "aegis_alert_channel_recv",
]

[parse]
parse_deps = false

[fn]
prefix = "extern"
postfix = ""
args = "auto"

