language = "C"
include_guard = "MACE_EBPF_H"
pragma_once = true
autogen_warning = "/* THIS FILE IS AUTO-GENERATED BY cbindgen. DO NOT EDIT. */"
tab_width = 4
documentation = true
documentation_style = "c99"

[export]
include = [
    "RawMemoryEvent",
    "CAlert",
    "CSeverity",
    "MaceArenaHandle",
    "MaceAlertChannelHandle",
    "MaceErrorCode",
    "mace_arena_new",
    "mace_arena_free",
    "mace_arena_push",
    "mace_arena_pop",
    "mace_arena_try_push",
    "mace_arena_try_pop",
    "mace_arena_len",
    "mace_arena_capacity",
    "mace_alert_channel_new",
    "mace_alert_channel_free",
    "mace_alert_channel_try_recv",
    "mace_alert_channel_recv",
]

[parse]
parse_deps = false

[fn]
prefix = "extern"
postfix = ""
args = "auto"

