syntax = "proto3";

package mace;

option go_package = "github.com/mace-ebpf/sdk/pkg/mace/maceproto";

// Severity level of an alert
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_LOW = 2;
  SEVERITY_MEDIUM = 3;
  SEVERITY_HIGH = 4;
  SEVERITY_CRITICAL = 5;
}

// A security alert triggered by a rule match
message Alert {
  // Unique identifier for this alert instance
  string alert_id = 1;

  // Name of the rule that triggered this alert
  string rule_name = 2;

  // Severity level
  Severity severity = 3;

  // Human-readable description
  string message = 4;

  // Process ID that triggered the alert
  uint32 tgid = 5;

  // Process name (comm field from kernel)
  string process_name = 6;

  // Timestamp (nanoseconds since epoch)
  uint64 timestamp_ns = 7;

  // Optional: JSON-encoded context data
  string context_json = 8;
}

// A batch of alerts (for efficient delivery)
message AlertBatch {
  repeated Alert alerts = 1;
}
