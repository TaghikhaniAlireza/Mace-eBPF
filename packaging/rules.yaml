rules:
  - id: "PLACEHOLDER_EXECVE_WHOAMI"
    name: "Example: execve argv contains whoami"
    severity: "low"
    description: "Replace or extend this file with fleet-specific detection and suppressions."
    conditions:
      syscall: "execve"
      argv_contains:
        - "whoami"

suppressions: []
