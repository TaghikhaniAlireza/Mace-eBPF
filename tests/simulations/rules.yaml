# Validation rules for Phase 2.2 attack simulations (`tests/simulations/attack_simulator.py`).
# Load this file into the Mace pipeline while the sensor runs as root.
#
# Agent config: use `tests/simulations/mace-agent.example.yaml` (do not pass this file as
# `mace-agent --config` — it is rules-only; the agent needs `logging` + `rules.path`).
#
# Layout tip: one file is fine for demos. For production, prefer a directory passed as rules_path —
# every `*.yaml` / `*.yml` is merged in sorted order (e.g. `10-rules.yaml`, `90-suppressions.yaml`).
#
# Note: `attack_simulator.py` is often run with `sudo`, so syscalls from that process show uid=0.
# Rules that should match the simulator therefore use uid: 0 where needed, or omit `uid` to match any user.
#
# Optional per-rule metadata (JSON / logs): tags, mitre_tactics, mitre_techniques, references
# Optional conditions: env_contains (execve + /proc environ), target_process_pattern (ptrace target comm),
#   memfd_name_pattern (memfd_create name snapshot).

rules:
  # Interactive testing: plain `whoami` in another terminal (execve argv contains this substring).
  - id: "SIM_INTERACTIVE_WHOAMI"
    name: "Interactive whoami (manual test)"
    severity: "medium"
    description: "Matches execve cmdline containing whoami (see also attack_simulator / SIM_*)."
    tags: ["simulation", "recon"]
    mitre_tactics: ["Discovery"]
    mitre_techniques: ["T1033"]
    references: ["https://attack.mitre.org/techniques/T1033/"]
    conditions:
      syscall: "execve"
      argv_contains:
        - "whoami"

  - id: "SIM_A_RWX"
    name: "Anonymous RWX via mprotect"
    severity: "high"
    description: "Detect transition to PROT_READ|PROT_WRITE|PROT_EXEC on memory (JIT-style shellcode staging)."
    tags: ["simulation", "memory", "defense-evasion"]
    mitre_tactics: ["Defense Evasion"]
    mitre_techniques: ["T1055", "T1055.008"]
    references: ["https://attack.mitre.org/techniques/T1055/008/"]
    conditions:
      syscall: "mprotect"
      flags_contains: ["PROT_EXEC", "PROT_WRITE"]

  - id: "SIM_B_TMP_EXEC"
    name: "Execution from /tmp copy"
    severity: "high"
    description: "Detect execve where argv references the simulated payload copied under /tmp."
    tags: ["simulation", "execution", "persistence"]
    mitre_tactics: ["Execution"]
    mitre_techniques: ["T1204.002"]
    references: ["https://attack.mitre.org/techniques/T1204/002/"]
    conditions:
      syscall: "execve"
      argv_contains:
        - "malicious_payload"
      # attack_simulator sets LD_PRELOAD in the child environ for this execve path
      env_contains:
        - "LD_PRELOAD="

  # Matches `cat /etc/shadow` whether run as root (simulator) or as a normal user: no uid filter.
  - id: "SIM_C_SHADOW_EXEC"
    name: "Sensitive read via shell (execve cmdline)"
    severity: "critical"
    description: "Detect execve whose captured argv contains cat and /etc/shadow (covers `sh -c 'cat ...'`)."
    tags: ["simulation", "credential-access"]
    mitre_tactics: ["Credential Access"]
    mitre_techniques: ["T1003.008"]
    references: ["https://attack.mitre.org/techniques/T1003/008/"]
    conditions:
      syscall: "execve"
      cmdline_contains_any:
        - "cat /etc/shadow"

  - id: "SIM_C_SHADOW_OPEN"
    name: "Sensitive file open (openat)"
    severity: "critical"
    description: "Detect openat resolving to /etc/shadow (path captured in-kernel at sys_enter_openat)."
    tags: ["simulation", "credential-access"]
    mitre_tactics: ["Credential Access"]
    mitre_techniques: ["T1003.008"]
    references: ["https://attack.mitre.org/techniques/T1003/008/"]
    conditions:
      syscall: "openat"
      pathname_pattern: ".*/etc/shadow$"

  - id: "SIM_C_PTRACE_ATTACH"
    name: "Ptrace attach attempt"
    severity: "critical"
    description: "Detect ptrace(PTRACE_ATTACH, ...) — emitted on syscall exit even when EPERM/ESRCH (failed attach)."
    tags: ["simulation", "privilege-escalation"]
    mitre_tactics: ["Privilege Escalation", "Defense Evasion"]
    mitre_techniques: ["T1055.008"]
    references: ["https://attack.mitre.org/techniques/T1055/008/"]
    conditions:
      syscall: "ptrace"
      ptrace_request: 16
      # Scenario attaches to pid 1 (init/systemd); comm read from /proc/1/comm at eval time
      target_process_pattern: "^(systemd|init)$"

  - id: "SIM_D_MEMFD_SPOOFED_NAME"
    name: "memfd_create with suspicious name (simulation)"
    severity: "high"
    description: "attack_simulator calls memfd_create with a spoofed-style name; matches memfd_name_pattern."
    tags: ["simulation", "defense-evasion", "fileless"]
    mitre_tactics: ["Defense Evasion"]
    mitre_techniques: ["T1055.009"]
    references: ["https://attack.mitre.org/techniques/T1055/009/"]
    conditions:
      syscall: "memfd_create"
      memfd_name_pattern: "kworker|mace_sim"

  # ---------------------------------------------------------------------------
  # GTFOBins-style & interpreter abuse (execve haystack: eBPF argv + /proc cmdline)
  # Paths like /path/to/* and string DATA are placeholders — patterns avoid hard-coding them.
  # ---------------------------------------------------------------------------

  - id: "SIM_GDB_SHELL_BREAKOUT_EX"
    name: "gdb scripted shell breakout (-ex '!…')"
    severity: "high"
    description: >
      Detects gdb launched with -ex invoking a host shell via the classic '!/' command
      injection pattern (non-interactive scripted abuse, not normal TUI debugging).
    tags: ["gtfobins", "gdb", "execution", "defense-evasion"]
    mitre_tactics: ["Execution", "Defense Evasion"]
    mitre_techniques: ["T1059", "T1202"]
    references:
      - "https://gtfobins.org/gtfobins/gdb/"
      - "https://attack.mitre.org/techniques/T1202/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^gdb$"
      cmdline_context_pattern: '(?i)\bgdb\b.*-ex\s+[''"][^''"]*!/'
      argv_contains:
        - "-ex"

  - id: "SIM_GDB_PYTHON_SETUID_SHELL"
    name: "gdb Python one-liner privilege manipulation (setuid family)"
    severity: "critical"
    description: >
      gdb -ex 'python …' invoking setuid/seteuid/setresuid is a GTFOBins-style priv-esc staging
      pattern. Does not require a successful shell spawn (Python may error before `!/bin/sh` runs).
    tags: ["gtfobins", "gdb", "privilege-escalation", "execution"]
    mitre_tactics: ["Privilege Escalation", "Execution"]
    mitre_techniques: ["T1059", "T1548.001"]
    references:
      - "https://gtfobins.org/gtfobins/gdb/"
      - "https://attack.mitre.org/techniques/T1548/001/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^gdb$"
      cmdline_context_pattern: '(?i)-ex\s+[''"][^''"]*python[^''"]*(setuid|seteuid|setresuid)\s*\('
      argv_contains:
        - "python"

  - id: "SIM_GDB_DUMP_VALUE_TO_FILE"
    name: "gdb scripted memory dump to path (dump value)"
    severity: "high"
    description: >
      Scripted gdb that uses 'dump value' to write process memory or evaluated data to a
      filesystem path — common in post-exploitation / credential harvesting workflows.
    tags: ["gtfobins", "gdb", "collection", "credential-access"]
    mitre_tactics: ["Collection", "Credential Access"]
    mitre_techniques: ["T1003", "T1552.001"]
    references:
      - "https://gtfobins.org/gtfobins/gdb/"
      - "https://attack.mitre.org/techniques/T1003/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^gdb$"
      argv_contains:
        - "dump value"
        - "-ex"

  - id: "SIM_GZIP_PIPE_SELF_DECODE"
    name: "gzip compress-to-stdout piped into gzip decompress (obfuscation chain)"
    severity: "medium"
    description: >
      Piping `gzip -c` output into `gzip -d` is an unusual self-referential transform often
      used to hide payloads in transit or logs; not proof of malice alone but useful in hunts.
    tags: ["gtfobins", "gzip", "defense-evasion"]
    mitre_tactics: ["Defense Evasion"]
    mitre_techniques: ["T1027", "T1140"]
    references:
      - "https://gtfobins.org/gtfobins/gzip/"
      - "https://attack.mitre.org/techniques/T1027/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^gzip$"
      cmdline_contains_any:
        - "gzip -c"
      argv_contains:
        - "|"
        - "gzip -d"

  - id: "SIM_NODE_CHILD_PROCESS_SHELL"
    name: "Node.js child_process spawning interactive shell"
    severity: "high"
    description: >
      Node one-liner loading child_process and spawning /bin/sh with stdio wired to the
      parent — consistent with GTFOBins-style execution and reverse-shell staging.
    tags: ["gtfobins", "nodejs", "execution"]
    mitre_tactics: ["Execution"]
    mitre_techniques: ["T1059.007", "T1218"]
    references:
      - "https://gtfobins.org/gtfobins/node/"
      - "https://attack.mitre.org/techniques/T1059/007/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "child_process"
        - "/bin/sh"

  - id: "SIM_NODE_SETUID_THEN_SHELL"
    name: "Node.js setuid/seteuid then child_process shell"
    severity: "critical"
    description: >
      Dropping privileges or attempting uid manipulation via process.setuid before spawning
      a shell from Node is high-signal for abuse tooling rather than typical app servers.
    tags: ["nodejs", "privilege-escalation", "execution"]
    mitre_tactics: ["Privilege Escalation", "Execution"]
    mitre_techniques: ["T1059.007", "T1548.001"]
    references:
      - "https://attack.mitre.org/techniques/T1548/001/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "setuid"
        - "child_process"
        - "/bin/sh"

  - id: "SIM_NODE_REVERSE_SHELL_JS_PATTERN"
    name: "Node.js reverse shell wiring (net + child_process + pipe)"
    severity: "critical"
    description: >
      Detects the common JS one-liner: spawn a shell, open a TCP client, and pipe sockets
      to shell stdio. Uses ordered-independent substrings on the full cmdline haystack (not a fixed C2 host).
    tags: ["nodejs", "command-and-control", "execution"]
    mitre_tactics: ["Command and Control", "Execution"]
    mitre_techniques: ["T1059.007", "T1071.001"]
    references:
      - "https://attack.mitre.org/techniques/T1071/001/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      cmdline_contains_any:
        - 'require("net")'
        - "require('net')"
      argv_contains:
        - "child_process"
        - ".connect("
        - "spawn("
        - "/bin/sh"
        - ".pipe("

  - id: "SIM_NETCAT_LISTENER_EXEC"
    name: "netcat classic listen bind (-l -p)"
    severity: "medium"
    description: >
      Execution of nc/netcat with listen and port bind flags — common staging for reverse
      shells or ad-hoc data exfil; tune process_name_pattern for your nc alternatives (ncat, …).
    tags: ["netcat", "command-and-control", "network"]
    mitre_tactics: ["Command and Control"]
    mitre_techniques: ["T1090", "T1071.001"]
    references:
      - "https://attack.mitre.org/techniques/T1090/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^(nc|netcat|ncat)$"
      argv_contains:
        - "-l"
        - "-p"

  - id: "SIM_NODE_FS_WRITE_SYNC"
    name: "Node.js writeFileSync one-liner (arbitrary file write)"
    severity: "high"
    description: >
      In-memory one-liner using fs.writeFileSync — often used to drop webshells, cron
      entries, or SSH keys; path substrings are attacker-specific; this rule keys on API abuse.
    tags: ["nodejs", "impact"]
    mitre_tactics: ["Impact"]
    mitre_techniques: ["T1485", "T1546.004"]
    references:
      - "https://attack.mitre.org/techniques/T1485/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "writeFileSync"
        - "fs"

  - id: "SIM_NODE_FS_READ_SYNC_STDOUT"
    name: "Node.js readFileSync piped to stdout (bulk file read)"
    severity: "medium"
    description: >
      Exfil-style read of a file path via readFileSync with stdout.write — useful when
      combined with other alerts or parent process context.
    tags: ["nodejs", "collection"]
    mitre_tactics: ["Collection"]
    mitre_techniques: ["T1005"]
    references:
      - "https://attack.mitre.org/techniques/T1005/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "readFileSync"
        - "stdout.write"

  - id: "SIM_NODE_HTTP_UPLOAD_STREAM"
    name: "Node.js HTTP upload (read stream piped to request)"
    severity: "high"
    description: >
      createReadStream from disk piped into http(s).request — scripted exfil over HTTP without curl/wget.
    tags: ["nodejs", "exfiltration", "command-and-control"]
    mitre_tactics: ["Exfiltration", "Command and Control"]
    mitre_techniques: ["T1048.003", "T1071.001"]
    references:
      - "https://attack.mitre.org/techniques/T1048/003/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "createReadStream"
        - "http"
        - "pipe("

  - id: "SIM_NODE_HTTP_DOWNLOAD_STREAM"
    name: "Node.js HTTP download (response piped to write stream)"
    severity: "high"
    description: >
      http(s).get with response piped to createWriteStream — scripted download-to-disk from a URL.
    tags: ["nodejs", "command-and-control"]
    mitre_tactics: ["Command and Control", "Ingress Tool Transfer"]
    mitre_techniques: ["T1105", "T1071.001"]
    references:
      - "https://attack.mitre.org/techniques/T1105/"
    conditions:
      syscall: "execve"
      process_name_pattern: "^node$"
      argv_contains:
        - "createWriteStream"
        - "pipe("
      cmdline_contains_any:
        - "http.get"
        - "https.get"

# ------------------------------------------------------------------------------
# Suppressions: trusted / high-volume benign patterns (adjust for your fleet).
# When both a rule and a suppression match, alerts are skipped but matched_rules
# stays populated in JSON; Go example prints SUPPRESSED_ALERT.
# ------------------------------------------------------------------------------
suppressions:
  - id: "SUPP_SYSTEMD_OOMD_OPENAT"
    name: "systemd-oomd memory accounting"
    description: "Reads /proc/meminfo and cgroup memory.pressure-style paths for OOM decisions."
    conditions:
      syscall: "openat"
      process_name_pattern: "^systemd-oomd$"
      pathname_pattern: ".*/(proc/meminfo|sys/fs/cgroup/.*)$"

  - id: "SUPP_GSD_HOUSEKEEPING_MOUNTS"
    name: "GNOME housekeeping mount probes"
    description: "gnome-settings-daemon housekeeping monitors mounts."
    conditions:
      syscall: "openat"
      process_name_pattern: "^gsd-housekeep"
      pathname_pattern: ".*/(proc/self/mountinfo|run/mount/utab)$"

  - id: "SUPP_GNOME_SHELL_PROC_STAT"
    name: "gnome-shell /proc reads"
    description: "Compositor periodically reads process stats."
    conditions:
      syscall: "openat"
      process_name_pattern: "^gnome-shell$"
      pathname_pattern: ".*/proc/(self/stat|[0-9]+/stat)$"

  - id: "SUPP_PIPELINE_PASSWD_ENRICHMENT"
    name: "Mace pipeline passwd enrichment"
    description: "Tokio worker threads resolve uid→username via /etc/passwd."
    conditions:
      syscall: "openat"
      process_name_pattern: "^tokio-rt-worker$"
      pathname_pattern: ".*/etc/passwd$"

  - id: "SUPP_GO_EXAMPLE_TRACEFS_SYSCALL_IDS"
    name: "Go example tracefs syscall metadata"
    description: "examples binary probes tracepoint ids under /sys/kernel/tracing during attach."
    conditions:
      syscall: "openat"
      process_name_pattern: "^examples$"
      pathname_pattern: ".*/sys/kernel/tracing/events/syscalls/.*"

  - id: "SUPP_GO_EXAMPLE_MAP_ANON_READ"
    name: "Go runtime anonymous mmap"
    description: "Typical PROT_READ anonymous mapping from the Go example / runtime."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^examples$"
      flags_contains: ["PROT_READ"]
      flags_excludes: ["PROT_EXEC", "PROT_WRITE"]

  - id: "SUPP_GNOME_SHELL_MAP_ANON_READ"
    name: "Mutter/clutter anonymous read mappings"
    description: "Legacy: mmap flags field carries MAP_* bits (see SUPP_GNOME_SHELL_MAP_ANONYMOUS)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ"]
      flags_excludes: ["PROT_EXEC", "PROT_WRITE"]

  # mmap `flags` in events is syscall arg3 (MAP_*); e.g. 0x32 includes MAP_PRIVATE|MAP_ANONYMOUS — not PROT_*.
  - id: "SUPP_GNOME_SHELL_MAP_ANONYMOUS"
    name: "gnome-shell anonymous mmap arenas"
    description: "Compositor allocates MAP_PRIVATE|MAP_ANONYMOUS regions (typical flags like 0x22/0x32)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  - id: "SUPP_TOKIO_WORKER_MAP_ANON"
    name: "Tokio worker anonymous mappings"
    description: "Standard allocator anonymous regions (non-executable)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^tokio-rt-worker$"
      flags_contains: ["PROT_READ", "PROT_WRITE"]
      flags_excludes: ["PROT_EXEC"]

  # --- Python interpreter & stdlib loads (does not match `/tmp/malicious_payload` opens) ---
  - id: "SUPP_PYTHON_OPENAT_STDLIB"
    name: "Python stdlib / bytecode paths"
    description: "Interpreter reads __pycache__, site-packages, lib-dynload, ld.so.cache, shared libs."
    conditions:
      syscall: "openat"
      process_name_pattern: "^python3?$"
      pathname_pattern: ".*/(usr/lib/python[0-9.]+/.*|lib/x86_64-linux-gnu/.*|etc/ld\\.so\\.cache)$"

  - id: "SUPP_PYTHON_PROC_SELF_FD"
    name: "Python /proc/self/fd listing"
    description: "Occasional introspection during subprocess or FD handling."
    conditions:
      syscall: "openat"
      process_name_pattern: "^python3?$"
      pathname_pattern: ".*/proc/self/fd$"

  # --- gnome-shell: RX mprotect churn (flags 0x5 = READ|EXEC), not SIM_A_RWX which requires WRITE ---
  - id: "SUPP_GNOME_SHELL_MPROTECT_RX"
    name: "Shell JIT RX transitions without write"
    description: "Suppress READ|EXEC mprotect noise; keep rules that require PROT_WRITE on mprotect."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ", "PROT_EXEC"]
      flags_excludes: ["PROT_WRITE"]

  # --- irqbalance / VMware guest tools ---
  - id: "SUPP_IRQBALANCE_PROC"
    name: "irqbalance /proc metrics"
    description: "Daemon rebalances IRQ affinity using /proc/interrupts, stat, irq affinity files."
    conditions:
      syscall: "openat"
      process_name_pattern: "^irqbalance$"
      pathname_pattern: ".*/proc/(interrupts|stat|irq/[0-9]+/smp_affinity)$"

  - id: "SUPP_VMTOOLSD_PROC"
    name: "open-vm-tools guest introspection"
    description: "/proc stats, block device sysfs walks, DNS/routing snapshot (guest OS inventory)."
    conditions:
      syscall: "openat"
      process_name_pattern: "^vmtoolsd$"
      pathname_pattern: ".*/(etc/mtab|proc/(meminfo|vmstat|stat|zoneinfo|uptime|diskstats|devices|net/route|net/ipv6_route)|run/systemd/resolve/resolv\\.conf|sys/class/block(/.*)?)$"

  # --- Interactive tiny utilities (locale/terminfo); narrow comm to avoid masking malicious `cat` ---
  - id: "SUPP_CLEAR_LOCALE_TERMI"
    name: "clear(1) ncurses locale loads"
    description: "Terminal clear loads terminfo + libc gettext catalogs."
    conditions:
      syscall: "openat"
      process_name_pattern: "^clear$"
      pathname_pattern: ".*/(lib/x86_64-linux-gnu/(libtinfo|libc)\\.so\\.[0-9]+|etc/ld\\.so\\.cache|lib/terminfo/.*|usr/share/locale(-langpack)?/.*\\.mo)$"

  # --- Go example runtime huge anonymous maps (MAP_PRIVATE|MAP_ANONYMOUS often 0x22 in flags field) ---
  - id: "SUPP_EXAMPLES_MAP_ANON_HUGE"
    name: "examples runtime arena maps"
    description: "Large anonymous RW mappings from the embedded Go monitor (non-exec)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^examples$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  # --- Full JIT stack: RWX mprotect (matches rules that look for PROT_EXEC+PROT_WRITE on mprotect) ---
  # Note: kernel `comm` is ≤15 chars and may be truncated (e.g. `chromium-brows`); extend patterns as needed.
  - id: "SUPP_JIT_GNOME_SHELL_MPROTECT_RWX"
    name: "gnome-shell full RWX mprotect (Mutter/Clutter JIT)"
    description: "Compositor JIT uses anonymous RW→RWX transitions; suppress SIM_A_RWX-style noise for this task."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_CHROMIUM_FAMILY_MPROTECT_RWX"
    name: "Chromium/Electron/V8 family RWX mprotect"
    description: "Browser renderer & helper processes JIT WebAssembly / JS."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(chrome|chrom|Chromium|chromium|electron|msedge|Microsoft\\x20E|QtWebEngine)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_FIREFOX_FAMILY_MPROTECT_RWX"
    name: "Firefox / Gecko RWX mprotect"
    description: "SpiderMonkey JIT and WebGPU/content helpers (comm names vary by version)."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(firefox|Mozilla\\x20Thr|Socket\\x20Cont|RDD\\x20Process|Web\\x20Content)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_MANAGED_RUNTIMES_MPROTECT_RWX"
    name: "Node.js / JVM / Ruby / PHP JIT RWX mprotect"
    description: "Typical JIT tiers for managed language VMs on servers and desktops."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(node|nodejs|java|javaw|beam\\.smp|ruby|ruby\\.bin|php|php\\.bin|dotnet|mono-sgen)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  # --- Trusted anonymous mmap churn (large RW heaps, still non-exec in flags field) ---
  - id: "SUPP_JIT_NODE_MAP_ANON_RW"
    name: "Node.js anonymous heap maps"
    description: "V8 allocates large MAP_PRIVATE|MAP_ANONYMOUS regions (non-exec bit in mmap prot)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^node$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  - id: "SUPP_JIT_JAVA_MAP_ANON_RW"
    name: "JVM anonymous heap maps"
    description: "HotSpot / OpenJDK anonymous mappings during startup and GC arenas."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^java$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  # --- Desktop service daemons (locale, icons, caches) — narrow path prefixes ---
  - id: "SUPP_DBUS_SESSION_OPENAT"
    name: "DBus session helper reads"
    description: "Icon/mime/XDG document portal paths (tighten if you need stricter policy)."
    conditions:
      syscall: "openat"
      process_name_pattern: "^(dbus-daemon|xdg-document|gvfs)"
      pathname_pattern: ".*/(usr/share/(icons|mime|glib-2.0)(/|$)|run/user/[0-9]+/doc($|/))"

  - id: "SUPP_NETWORKMANAGER_OPENAT"
    name: "NetworkManager state reads"
    description: "NM polls lease and config paths."
    conditions:
      syscall: "openat"
      process_name_pattern: "^NetworkManager$"
      pathname_pattern: ".*/(run/NetworkManager|etc/resolv\\.conf|proc/sys/net/.*)$"
