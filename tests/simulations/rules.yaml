# Validation rules for Phase 2.2 attack simulations (`tests/simulations/attack_simulator.py`).
# Load this file into the Mace pipeline while the sensor runs as root.
#
# Layout tip: one file is fine for demos. For production, prefer a directory passed as rules_path —
# every `*.yaml` / `*.yml` is merged in sorted order (e.g. `10-rules.yaml`, `90-suppressions.yaml`).
#
# Note: `attack_simulator.py` is often run with `sudo`, so syscalls from that process show uid=0.
# Rules that should match the simulator therefore use uid: 0 where needed, or omit `uid` to match any user.

rules:
  # Interactive testing: plain `whoami` in another terminal (execve argv contains this substring).
  - id: "SIM_INTERACTIVE_WHOAMI"
    name: "Interactive whoami (manual test)"
    severity: "medium"
    description: "Matches execve cmdline containing whoami (see also attack_simulator / SIM_*)."
    conditions:
      syscall: "execve"
      argv_contains:
        - "whoami"

  - id: "SIM_A_RWX"
    name: "Anonymous RWX via mprotect"
    severity: "high"
    description: "Detect transition to PROT_READ|PROT_WRITE|PROT_EXEC on memory (JIT-style shellcode staging)."
    conditions:
      syscall: "mprotect"
      flags_contains: ["PROT_EXEC", "PROT_WRITE"]

  - id: "SIM_B_TMP_EXEC"
    name: "Execution from /tmp copy"
    severity: "high"
    description: "Detect execve where argv references the simulated payload copied under /tmp."
    conditions:
      syscall: "execve"
      argv_contains:
        - "malicious_payload"

  # Matches `cat /etc/shadow` whether run as root (simulator) or as a normal user: no uid filter.
  - id: "SIM_C_SHADOW_EXEC"
    name: "Sensitive read via shell (execve cmdline)"
    severity: "critical"
    description: "Detect execve whose captured argv contains cat and /etc/shadow (covers `sh -c 'cat ...'`)."
    conditions:
      syscall: "execve"
      cmdline_contains_any:
        - "cat /etc/shadow"

  - id: "SIM_C_SHADOW_OPEN"
    name: "Sensitive file open (openat)"
    severity: "critical"
    description: "Detect openat resolving to /etc/shadow (path captured in-kernel at sys_enter_openat)."
    conditions:
      syscall: "openat"
      pathname_pattern: ".*/etc/shadow$"

  - id: "SIM_C_PTRACE_ATTACH"
    name: "Ptrace attach attempt"
    severity: "critical"
    description: "Detect ptrace(PTRACE_ATTACH, ...) — emitted on syscall exit even when EPERM/ESRCH (failed attach)."
    conditions:
      syscall: "ptrace"
      ptrace_request: 16

# ------------------------------------------------------------------------------
# Suppressions: trusted / high-volume benign patterns (adjust for your fleet).
# When both a rule and a suppression match, alerts are skipped but matched_rules
# stays populated in JSON; Go example prints SUPPRESSED_ALERT.
# ------------------------------------------------------------------------------
suppressions:
  - id: "SUPP_SYSTEMD_OOMD_OPENAT"
    name: "systemd-oomd memory accounting"
    description: "Reads /proc/meminfo and cgroup memory.pressure-style paths for OOM decisions."
    conditions:
      syscall: "openat"
      process_name_pattern: "^systemd-oomd$"
      pathname_pattern: ".*/(proc/meminfo|sys/fs/cgroup/.*)$"

  - id: "SUPP_GSD_HOUSEKEEPING_MOUNTS"
    name: "GNOME housekeeping mount probes"
    description: "gnome-settings-daemon housekeeping monitors mounts."
    conditions:
      syscall: "openat"
      process_name_pattern: "^gsd-housekeep"
      pathname_pattern: ".*/(proc/self/mountinfo|run/mount/utab)$"

  - id: "SUPP_GNOME_SHELL_PROC_STAT"
    name: "gnome-shell /proc reads"
    description: "Compositor periodically reads process stats."
    conditions:
      syscall: "openat"
      process_name_pattern: "^gnome-shell$"
      pathname_pattern: ".*/proc/(self/stat|[0-9]+/stat)$"

  - id: "SUPP_PIPELINE_PASSWD_ENRICHMENT"
    name: "Mace pipeline passwd enrichment"
    description: "Tokio worker threads resolve uid→username via /etc/passwd."
    conditions:
      syscall: "openat"
      process_name_pattern: "^tokio-rt-worker$"
      pathname_pattern: ".*/etc/passwd$"

  - id: "SUPP_GO_EXAMPLE_TRACEFS_SYSCALL_IDS"
    name: "Go example tracefs syscall metadata"
    description: "examples binary probes tracepoint ids under /sys/kernel/tracing during attach."
    conditions:
      syscall: "openat"
      process_name_pattern: "^examples$"
      pathname_pattern: ".*/sys/kernel/tracing/events/syscalls/.*"

  - id: "SUPP_GO_EXAMPLE_MAP_ANON_READ"
    name: "Go runtime anonymous mmap"
    description: "Typical PROT_READ anonymous mapping from the Go example / runtime."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^examples$"
      flags_contains: ["PROT_READ"]
      flags_excludes: ["PROT_EXEC", "PROT_WRITE"]

  - id: "SUPP_GNOME_SHELL_MAP_ANON_READ"
    name: "Mutter/clutter anonymous read mappings"
    description: "Legacy: mmap flags field carries MAP_* bits (see SUPP_GNOME_SHELL_MAP_ANONYMOUS)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ"]
      flags_excludes: ["PROT_EXEC", "PROT_WRITE"]

  # mmap `flags` in events is syscall arg3 (MAP_*); e.g. 0x32 includes MAP_PRIVATE|MAP_ANONYMOUS — not PROT_*.
  - id: "SUPP_GNOME_SHELL_MAP_ANONYMOUS"
    name: "gnome-shell anonymous mmap arenas"
    description: "Compositor allocates MAP_PRIVATE|MAP_ANONYMOUS regions (typical flags like 0x22/0x32)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  - id: "SUPP_TOKIO_WORKER_MAP_ANON"
    name: "Tokio worker anonymous mappings"
    description: "Standard allocator anonymous regions (non-executable)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^tokio-rt-worker$"
      flags_contains: ["PROT_READ", "PROT_WRITE"]
      flags_excludes: ["PROT_EXEC"]

  # --- Python interpreter & stdlib loads (does not match `/tmp/malicious_payload` opens) ---
  - id: "SUPP_PYTHON_OPENAT_STDLIB"
    name: "Python stdlib / bytecode paths"
    description: "Interpreter reads __pycache__, site-packages, lib-dynload, ld.so.cache, shared libs."
    conditions:
      syscall: "openat"
      process_name_pattern: "^python3?$"
      pathname_pattern: ".*/(usr/lib/python[0-9.]+/.*|lib/x86_64-linux-gnu/.*|etc/ld\\.so\\.cache)$"

  - id: "SUPP_PYTHON_PROC_SELF_FD"
    name: "Python /proc/self/fd listing"
    description: "Occasional introspection during subprocess or FD handling."
    conditions:
      syscall: "openat"
      process_name_pattern: "^python3?$"
      pathname_pattern: ".*/proc/self/fd$"

  # --- gnome-shell: RX mprotect churn (flags 0x5 = READ|EXEC), not SIM_A_RWX which requires WRITE ---
  - id: "SUPP_GNOME_SHELL_MPROTECT_RX"
    name: "Shell JIT RX transitions without write"
    description: "Suppress READ|EXEC mprotect noise; keep rules that require PROT_WRITE on mprotect."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ", "PROT_EXEC"]
      flags_excludes: ["PROT_WRITE"]

  # --- irqbalance / VMware guest tools ---
  - id: "SUPP_IRQBALANCE_PROC"
    name: "irqbalance /proc metrics"
    description: "Daemon rebalances IRQ affinity using /proc/interrupts, stat, irq affinity files."
    conditions:
      syscall: "openat"
      process_name_pattern: "^irqbalance$"
      pathname_pattern: ".*/proc/(interrupts|stat|irq/[0-9]+/smp_affinity)$"

  - id: "SUPP_VMTOOLSD_PROC"
    name: "open-vm-tools guest introspection"
    description: "/proc stats, block device sysfs walks, DNS/routing snapshot (guest OS inventory)."
    conditions:
      syscall: "openat"
      process_name_pattern: "^vmtoolsd$"
      pathname_pattern: ".*/(etc/mtab|proc/(meminfo|vmstat|stat|zoneinfo|uptime|diskstats|devices|net/route|net/ipv6_route)|run/systemd/resolve/resolv\\.conf|sys/class/block(/.*)?)$"

  # --- Interactive tiny utilities (locale/terminfo); narrow comm to avoid masking malicious `cat` ---
  - id: "SUPP_CLEAR_LOCALE_TERMI"
    name: "clear(1) ncurses locale loads"
    description: "Terminal clear loads terminfo + libc gettext catalogs."
    conditions:
      syscall: "openat"
      process_name_pattern: "^clear$"
      pathname_pattern: ".*/(lib/x86_64-linux-gnu/(libtinfo|libc)\\.so\\.[0-9]+|etc/ld\\.so\\.cache|lib/terminfo/.*|usr/share/locale(-langpack)?/.*\\.mo)$"

  # --- Go example runtime huge anonymous maps (MAP_PRIVATE|MAP_ANONYMOUS often 0x22 in flags field) ---
  - id: "SUPP_EXAMPLES_MAP_ANON_HUGE"
    name: "examples runtime arena maps"
    description: "Large anonymous RW mappings from the embedded Go monitor (non-exec)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^examples$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  # --- Full JIT stack: RWX mprotect (matches rules that look for PROT_EXEC+PROT_WRITE on mprotect) ---
  # Note: kernel `comm` is ≤15 chars and may be truncated (e.g. `chromium-brows`); extend patterns as needed.
  - id: "SUPP_JIT_GNOME_SHELL_MPROTECT_RWX"
    name: "gnome-shell full RWX mprotect (Mutter/Clutter JIT)"
    description: "Compositor JIT uses anonymous RW→RWX transitions; suppress SIM_A_RWX-style noise for this task."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^gnome-shell$"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_CHROMIUM_FAMILY_MPROTECT_RWX"
    name: "Chromium/Electron/V8 family RWX mprotect"
    description: "Browser renderer & helper processes JIT WebAssembly / JS."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(chrome|chrom|Chromium|chromium|electron|msedge|Microsoft\\x20E|QtWebEngine)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_FIREFOX_FAMILY_MPROTECT_RWX"
    name: "Firefox / Gecko RWX mprotect"
    description: "SpiderMonkey JIT and WebGPU/content helpers (comm names vary by version)."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(firefox|Mozilla\\x20Thr|Socket\\x20Cont|RDD\\x20Process|Web\\x20Content)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  - id: "SUPP_JIT_MANAGED_RUNTIMES_MPROTECT_RWX"
    name: "Node.js / JVM / Ruby / PHP JIT RWX mprotect"
    description: "Typical JIT tiers for managed language VMs on servers and desktops."
    conditions:
      syscall: "mprotect"
      process_name_pattern: "^(node|nodejs|java|javaw|beam\\.smp|ruby|ruby\\.bin|php|php\\.bin|dotnet|mono-sgen)"
      flags_contains: ["PROT_READ", "PROT_WRITE", "PROT_EXEC"]

  # --- Trusted anonymous mmap churn (large RW heaps, still non-exec in flags field) ---
  - id: "SUPP_JIT_NODE_MAP_ANON_RW"
    name: "Node.js anonymous heap maps"
    description: "V8 allocates large MAP_PRIVATE|MAP_ANONYMOUS regions (non-exec bit in mmap prot)."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^node$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  - id: "SUPP_JIT_JAVA_MAP_ANON_RW"
    name: "JVM anonymous heap maps"
    description: "HotSpot / OpenJDK anonymous mappings during startup and GC arenas."
    conditions:
      syscall: "mmap"
      process_name_pattern: "^java$"
      flags_contains: ["MAP_ANONYMOUS"]
      flags_excludes: ["PROT_EXEC"]

  # --- Desktop service daemons (locale, icons, caches) — narrow path prefixes ---
  - id: "SUPP_DBUS_SESSION_OPENAT"
    name: "DBus session helper reads"
    description: "Icon/mime/XDG document portal paths (tighten if you need stricter policy)."
    conditions:
      syscall: "openat"
      process_name_pattern: "^(dbus-daemon|xdg-document|gvfs)"
      pathname_pattern: ".*/(usr/share/(icons|mime|glib-2.0)(/|$)|run/user/[0-9]+/doc($|/))"

  - id: "SUPP_NETWORKMANAGER_OPENAT"
    name: "NetworkManager state reads"
    description: "NM polls lease and config paths."
    conditions:
      syscall: "openat"
      process_name_pattern: "^NetworkManager$"
      pathname_pattern: ".*/(run/NetworkManager|etc/resolv\\.conf|proc/sys/net/.*)$"
